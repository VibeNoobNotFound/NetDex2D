name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.6.0 or v1.6.0-beta.1)"
        required: true
        type: string
      release_type:
        description: "Release channel"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - release
      target_ref:
        description: "Branch, tag, or commit SHA to release"
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_type: ${{ steps.meta.outputs.release_type }}
      target_ref: ${{ steps.meta.outputs.target_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          DISPATCH_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          DISPATCH_TARGET_REF: ${{ github.event.inputs.target_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          should_release="false"
          release_tag=""
          release_type=""
          target_ref="${GITHUB_SHA}"
          target_sha="${GITHUB_SHA}"
          release_name=""
          is_prerelease="false"
          make_latest="false"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_release="true"
            release_tag="$(printf '%s' "${DISPATCH_TAG}" | xargs)"
            release_type="$(printf '%s' "${DISPATCH_RELEASE_TYPE}" | tr '[:upper:]' '[:lower:]' | xargs)"
            target_ref="$(printf '%s' "${DISPATCH_TARGET_REF:-${REF_NAME}}" | xargs)"
          else
            commit_message="$(git log -1 --pretty=%B "${GITHUB_SHA}")"
            release_tag="$(printf '%s\n' "${commit_message}" | sed -nE 's/^[Rr]elease:[[:space:]]*(.+)[[:space:]]*$/\1/p' | tail -n1 | xargs)"
            release_type="$(printf '%s\n' "${commit_message}" | sed -nE 's/^[Rr]elease-[Tt]ype:[[:space:]]*(.+)[[:space:]]*$/\1/p' | tail -n1 | tr '[:upper:]' '[:lower:]' | xargs)"

            if [[ -z "${release_tag}" && -z "${release_type}" ]]; then
              echo "No release footers found in head commit. Skipping release publish."
            else
              if [[ -z "${release_tag}" || -z "${release_type}" ]]; then
                echo "::error::Malformed release footers. Expected both 'Release: <tag>' and 'Release-Type: prerelease|release'."
                exit 1
              fi
              should_release="true"
            fi
          fi

          if [[ "${should_release}" == "true" ]]; then
            if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
              echo "::error::Invalid release tag '${release_tag}'. Expected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-suffix."
              exit 1
            fi

            if [[ "${release_type}" != "prerelease" && "${release_type}" != "release" ]]; then
              echo "::error::Invalid release type '${release_type}'. Expected 'prerelease' or 'release'."
              exit 1
            fi

            target_sha="$(git rev-parse "${target_ref}^{commit}")"
            git fetch --tags --force
            existing_tag_sha="$(git rev-list -n 1 "refs/tags/${release_tag}" 2>/dev/null || true)"
            if [[ -n "${existing_tag_sha}" && "${existing_tag_sha}" != "${target_sha}" ]]; then
              echo "::error::Tag '${release_tag}' already exists at ${existing_tag_sha}, not ${target_sha}."
              exit 1
            fi

            release_name="NetDex ${release_tag}"
            if [[ "${release_type}" == "prerelease" ]]; then
              is_prerelease="true"
              make_latest="false"
            else
              is_prerelease="false"
              make_latest="true"
            fi
          else
            target_sha="$(git rev-parse "${target_ref}^{commit}")"
          fi

          {
            echo "should_release=${should_release}"
            echo "release_tag=${release_tag}"
            echo "release_type=${release_type}"
            echo "target_ref=${target_ref}"
            echo "target_sha=${target_sha}"
            echo "release_name=${release_name}"
            echo "is_prerelease=${is_prerelease}"
            echo "make_latest=${make_latest}"
          } >> "${GITHUB_OUTPUT}"

  export-and-publish:
    name: Export and Publish
    needs: preflight
    if: needs.preflight.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.target_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build solution
        run: dotnet build src/NetDex.sln --configuration Release

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android export permissions
        run: bash src/tools/check_android_export_permissions.sh src/export_presets.cfg

      - name: Prepare prerelease Android signing + CI branding
        if: needs.preflight.outputs.is_prerelease == 'true'
        shell: bash
        env:
          ANDROID_PRERELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_PRERELEASE_KEYSTORE_B64 }}
          ANDROID_PRERELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_PRERELEASE_KEYSTORE_PASSWORD }}
          ANDROID_PRERELEASE_KEY_ALIAS: ${{ secrets.ANDROID_PRERELEASE_KEY_ALIAS }}
          ANDROID_PRERELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_PRERELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_PRERELEASE_KEYSTORE_B64}" || -z "${ANDROID_PRERELEASE_KEYSTORE_PASSWORD}" || -z "${ANDROID_PRERELEASE_KEY_ALIAS}" || -z "${ANDROID_PRERELEASE_KEY_PASSWORD}" ]]; then
            echo "::error::Missing prerelease Android signing secrets."
            exit 1
          fi
          if [[ "${ANDROID_PRERELEASE_KEYSTORE_PASSWORD}" != "${ANDROID_PRERELEASE_KEY_PASSWORD}" ]]; then
            echo "::error::Godot requires the keystore and key passwords to match."
            exit 1
          fi

          keystore_path="${RUNNER_TEMP}/netdex-prerelease.keystore"
          echo "${ANDROID_PRERELEASE_KEYSTORE_B64}" | base64 -d > "${keystore_path}"

          {
            echo "ANDROID_PRERELEASE_KEYSTORE_PATH=${keystore_path}"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=${keystore_path}"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=${ANDROID_PRERELEASE_KEY_ALIAS}"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=${ANDROID_PRERELEASE_KEYSTORE_PASSWORD}"
          } >> "${GITHUB_ENV}"

          sed -i 's/^package\/unique_name=.*/package\/unique_name="com.noobnotfound.netdex2d.prerelease"/' src/export_presets.cfg
          sed -i 's/^package\/name=.*/package\/name="NetDex (Beta)"/' src/export_presets.cfg
          sed -i 's/^package\/signed=.*/package\/signed=true/' src/export_presets.cfg
          grep -q '^package/unique_name="com.noobnotfound.netdex2d.prerelease"$' src/export_presets.cfg
          grep -q '^package/name="NetDex (Beta)"$' src/export_presets.cfg
          grep -q '^package/signed=true$' src/export_presets.cfg

          sed -i 's/^config\/name=.*/config\/name="NetDex (Beta)"/' src/project.godot
          grep -q '^config/name="NetDex (Beta)"$' src/project.godot

      - name: Disable Android signing for non-prerelease CI exports
        if: needs.preflight.outputs.is_prerelease != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! grep -q '^package/signed=true$' src/export_presets.cfg; then
            echo "::error::Expected package/signed=true in export preset."
            exit 1
          fi
          sed -i 's/^package\/signed=true$/package\/signed=false/' src/export_presets.cfg
          grep -q '^package/signed=false$' src/export_presets.cfg

      - name: Disable macOS code signing for CI exports
        shell: bash
        run: |
          set -euo pipefail

          # Linux runners do not provide Xcode tooling. Disable macOS code signing for CI export.
          if ! grep -q '^codesign/codesign=3$' src/export_presets.cfg; then
            echo "::warning::Expected codesign/codesign=3 in macOS preset; continuing with best-effort override."
          fi
          sed -i 's/^codesign\/codesign=3$/codesign\/codesign=0/' src/export_presets.cfg
          grep -q '^codesign/codesign=0$' src/export_presets.cfg

      - name: Export macOS
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=mono_linux_x86_64.zip&version=4.6.1
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=mono_export_templates.tpz&version=4.6.1
          relative_project_path: ./src
          use_preset_export_path: true
          archive_output: false
          cache: true
          verbose: false
          presets_to_export: macOS

      - name: Export Windows x86_64
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=mono_linux_x86_64.zip&version=4.6.1
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=mono_export_templates.tpz&version=4.6.1
          relative_project_path: ./src
          use_preset_export_path: true
          archive_output: false
          cache: true
          verbose: false
          presets_to_export: Windows Desktop (x86_64)

      - name: Export Windows ARM64 (attempt 1)
        id: export_win_arm64
        continue-on-error: true
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=mono_linux_x86_64.zip&version=4.6.1
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=mono_export_templates.tpz&version=4.6.1
          relative_project_path: ./src
          use_preset_export_path: true
          archive_output: false
          cache: true
          verbose: false
          presets_to_export: Windows Desktop (ARM64)

      - name: Export Windows ARM64 (attempt 2)
        id: export_win_arm64_retry
        if: steps.export_win_arm64.outcome == 'failure'
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=mono_linux_x86_64.zip&version=4.6.1
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=mono_export_templates.tpz&version=4.6.1
          relative_project_path: ./src
          use_preset_export_path: true
          archive_output: false
          cache: true
          verbose: false
          presets_to_export: Windows Desktop (ARM64)

      - name: Fail if Windows ARM64 export failed twice
        if: steps.export_win_arm64.outcome == 'failure' && steps.export_win_arm64_retry.outcome != 'success'
        run: |
          echo "::error::Windows ARM64 export failed after retry."
          exit 1

      - name: Export Linux x86_64
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=mono_linux_x86_64.zip&version=4.6.1
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=mono_export_templates.tpz&version=4.6.1
          relative_project_path: ./src
          use_preset_export_path: true
          archive_output: false
          cache: true
          verbose: false
          presets_to_export: Linux x86_64

      - name: Export Android
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=mono_linux_x86_64.zip&version=4.6.1
          godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=mono_export_templates.tpz&version=4.6.1
          relative_project_path: ./src
          use_preset_export_path: true
          archive_output: false
          cache: true
          verbose: false
          presets_to_export: Android

      - name: Log Godot build output tree
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing ~/.local/share/godot/builds"
          if [[ -d "${HOME}/.local/share/godot/builds" ]]; then
            find "${HOME}/.local/share/godot/builds" -maxdepth 5 -print
          else
            echo "No build directory at ${HOME}/.local/share/godot/builds"
          fi

      - name: Collect release artifacts
        id: package
        shell: bash
        run: |
          set -euo pipefail

          artifacts_dir="${RUNNER_TEMP}/release-artifacts"
          rm -rf "${artifacts_dir}"
          mkdir -p "${artifacts_dir}"

          build_dir="${HOME}/.local/share/godot/builds"
          search_roots=(
            "${GITHUB_WORKSPACE}/Publish"
            "${GITHUB_WORKSPACE}/src/Publish"
            "${HOME}/.local/share/godot/builds"
            "${build_dir}"
            "${GITHUB_WORKSPACE}"
          )

          select_file_by_name_and_path_pattern() {
            local file_name="$1"
            local path_pattern="$2"
            local root
            for root in "${search_roots[@]}"; do
              [[ -d "${root}" ]] || continue
              local hit
              hit="$(find "${root}" -type f -name "${file_name}" | grep -Ei "${path_pattern}" | head -n1 || true)"
              if [[ -n "${hit}" ]]; then
                echo "${hit}"
                return 0
              fi
            done
            return 1
          }

          select_dir_by_name_and_path_pattern() {
            local dir_name="$1"
            local path_pattern="$2"
            local root
            for root in "${search_roots[@]}"; do
              [[ -d "${root}" ]] || continue
              local hit
              hit="$(find "${root}" -type d -name "${dir_name}" | grep -Ei "${path_pattern}" | head -n1 || true)"
              if [[ -n "${hit}" ]]; then
                echo "${hit}"
                return 0
              fi
            done
            return 1
          }

          print_discovery_debug() {
            local root
            echo "Artifact discovery roots:"
            for root in "${search_roots[@]}"; do
              if [[ -d "${root}" ]]; then
                echo "  - ${root} (exists)"
              else
                echo "  - ${root} (missing)"
              fi
            done
            echo "Discovered candidate files/directories:"
            for root in "${search_roots[@]}"; do
              [[ -d "${root}" ]] || continue
              find "${root}" -maxdepth 6 \( -type f -name "NetDex.zip" -o -type f -name "NetDex.apk" -o -type d -name "NetDex.app" \) -print || true
            done
          }

          print_discovery_debug

          mac_source="$(select_file_by_name_and_path_pattern "NetDex.zip" "macos|/mac/" || true)"
          if [[ -n "${mac_source}" ]]; then
            cp "${mac_source}" "${artifacts_dir}/netdex-macos-universal.zip"
          else
            mac_app_dir="$(select_dir_by_name_and_path_pattern "NetDex.app" "macos|/mac/" || true)"
            if [[ -z "${mac_app_dir}" ]]; then
              echo "::error::Unable to locate macOS export output (NetDex.zip or NetDex.app)."
              exit 1
            fi
            (cd "$(dirname "${mac_app_dir}")" && zip -r -q "${artifacts_dir}/netdex-macos-universal.zip" "$(basename "${mac_app_dir}")")
          fi

          win_x86_source="$(select_file_by_name_and_path_pattern "NetDex.zip" "windows.*x86_64|windows.*x64|/windows/x86/" || true)"
          if [[ -z "${win_x86_source}" ]]; then
            echo "::error::Unable to locate Windows x86_64 export output."
            exit 1
          fi
          cp "${win_x86_source}" "${artifacts_dir}/netdex-windows-x86_64.zip"

          win_arm_source="$(select_file_by_name_and_path_pattern "NetDex.zip" "windows.*arm64|/windows/arm/" || true)"
          if [[ -z "${win_arm_source}" ]]; then
            echo "::error::Unable to locate Windows ARM64 export output."
            exit 1
          fi
          cp "${win_arm_source}" "${artifacts_dir}/netdex-windows-arm64.zip"

          linux_source="$(select_file_by_name_and_path_pattern "NetDex.zip" "linux" || true)"
          if [[ -z "${linux_source}" ]]; then
            echo "::error::Unable to locate Linux export output."
            exit 1
          fi
          cp "${linux_source}" "${artifacts_dir}/netdex-linux-x64.zip"

          android_source="$(select_file_by_name_and_path_pattern "NetDex.apk" "android" || true)"
          if [[ -z "${android_source}" ]]; then
            echo "::error::Unable to locate Android export output."
            exit 1
          fi
          cp "${android_source}" "${artifacts_dir}/netdex-android-arm64.apk"

          ls -lah "${artifacts_dir}"
          echo "artifacts_dir=${artifacts_dir}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          target_commitish: ${{ needs.preflight.outputs.target_sha }}
          name: ${{ needs.preflight.outputs.release_name }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.artifacts_dir }}/netdex-macos-universal.zip
            ${{ steps.package.outputs.artifacts_dir }}/netdex-windows-x86_64.zip
            ${{ steps.package.outputs.artifacts_dir }}/netdex-windows-arm64.zip
            ${{ steps.package.outputs.artifacts_dir }}/netdex-linux-x64.zip
            ${{ steps.package.outputs.artifacts_dir }}/netdex-android-arm64.apk
